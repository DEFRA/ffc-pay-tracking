resources:
  identity: pay-tracking
  postgreSql:
    name: ffc-pay-tracking
  topics:
    - name: ffc-pay-events
      role: receiver
      subscriptions:
        - name: ffc-pay-tracking
    - name: ffc-pay-events
      role: sender
      subscriptions:
        - name: ffc-pay-tracking
  storage_accounts:
    - name: pay
      containers:
        - name: data-requests
          roles:
            - name: blobContributor
      roles:
        - name: storageAccountContributor
