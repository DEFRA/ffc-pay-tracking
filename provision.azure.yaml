resources:
  identity: pay-tracking
  postgreSql:
    name: ffc-pay-tracking
  service_bus:
    topics:
      - name: ffc-pay-events
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: receiver
        subscriptions:
          - name: ffc-pay-tracking
            deadLetteringOnMessageExpiration: true
            defaultMessageTimeToLive: P3650D
            lockDuration: PT5M
            maxDeliveryCount: 2000
      - name: fcp-pds-data-retention
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: receiver
        subscriptions:
          - name: ffc-pay-tracking
            deadLetteringOnMessageExpiration: true
            defaultMessageTimeToLive: P3650D
            lockDuration: PT5M
            maxDeliveryCount: 2000
  storage_accounts:
    - name: pay
      containers:
        - name: data-requests
          roles:
            - name: blobContributor
      roles:
        - name: storageAccountContributor
